# Fixture: config with 3 deliberate breakages for doctor tests
# 1. Wrong catalog_version (mismatch with actual catalog)
# 2. A deprecated model in an executor
# 3. Missing required routing.classifier_model (to trigger schema validation failure)

catalog_version: "1999-01-01"

orchestrator:
  model: anthropic/claude-sonnet-4-6
  max_planning_tokens: 4000
  context_strategy: sliding_window
  context_window: 16000

executors:
  code:
    model: anthropic/claude-sonnet-4-6
    max_tokens: 8000
    tools: []
    context: task_only
  classifier:
    # claude-instant-1 is a model that is deprecated in the catalog
    model: anthropic/claude-instant-1
    max_tokens: 200
    tools: []
    context: message_only

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

routing:
  pre_classifier: true
  classifier_model: classifier
  complexity_threshold: 0.6

budgets:
  daily_limit_usd: 10.00
  per_task_limit_usd: 2.00
  warning_threshold: 0.80
